<!DOCTYPE html>
<!-- Painel do Mercado v1 - single file, Firebase compat, sem build -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#1F4034">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Painel do Mercado">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Painel do Mercado</title>
<!-- Ícone do app (SVG inline como data URI) -->
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#24211C; --paper:#F6F1E3; --paper-alt:#EEE6CE; --green:#1F4034;
  --amber:#B9822E; --red:#A6412E; --line:#D9CCA3; --faint:#8A8267;
  --disp:'Fraunces',serif; --body:'IBM Plex Sans',sans-serif; --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:var(--body);min-height:100vh;}
input,select,button{font-family:inherit;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}

/* header */
.hdr{background:var(--green);padding:18px 16px 14px;}
.hdr-in{max-width:640px;margin:0 auto;}
.hdr-top{display:flex;justify-content:space-between;align-items:center;}
.hdr h1{font-family:var(--disp);font-size:20px;font-weight:600;color:var(--paper);}
.hdr .tag{font-family:var(--mono);font-size:10.5px;color:#B9C7BE;letter-spacing:.5px;}
.month-nav{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.08);border-radius:99px;padding:3px;}
.month-nav button{background:none;border:none;color:var(--paper);font-size:16px;padding:5px 9px;cursor:pointer;border-radius:99px;}
.month-nav span{font-family:var(--mono);font-size:12px;color:var(--paper);min-width:88px;text-align:center;}
.kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px;}
.kpi{background:rgba(255,255,255,.08);border-radius:8px;padding:8px 10px;}
.kpi .l{font-size:10px;color:#B9C7BE;}
.kpi .v{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--paper);}
.kpi .v.neg{color:#E8A190;}

/* tabs */
.tabs{max-width:640px;margin:0 auto;padding:0 16px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{background:none;border:1px solid transparent;border-bottom:none;padding:10px 12px;border-radius:10px 10px 0 0;
  font-size:13px;color:var(--faint);cursor:pointer;white-space:nowrap;}
.tab.on{background:var(--paper);border-color:var(--line);color:var(--green);font-weight:600;margin-bottom:-1px;}
.rule{border-top:1px solid var(--line);}

/* content */
.wrap{max-width:640px;margin:0 auto;padding:16px 16px 90px;display:flex;flex-direction:column;gap:14px;}
.card{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.card>.ct{background:var(--paper-alt);border-bottom:1px dashed var(--line);padding:9px 14px;
  font-family:var(--disp);font-size:14.5px;font-weight:600;color:var(--green);}
.card>.cb{padding:12px 14px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fld label{display:block;font-size:12px;color:var(--faint);margin-bottom:4px;}
.fld .box{display:flex;align-items:center;gap:4px;background:#fff;border:1px solid var(--line);border-radius:7px;padding:8px 10px;}
.fld .box .pre{font-family:var(--mono);font-size:12.5px;color:var(--faint);}
.fld input{border:none;outline:none;width:100%;font-family:var(--mono);font-size:14px;color:var(--ink);background:transparent;}

.row{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;}
.row .rl{font-size:13.5px;}
.row .rv{font-family:var(--mono);font-size:13.5px;font-weight:500;}
.row.b .rl{font-size:14px;font-weight:600;}
.row.b .rv{font-size:14.5px;font-weight:700;}
.row.ind{padding-left:12px;}
.row .neg{color:var(--red);}
.row .mut{color:var(--faint);}
.dash{border-top:1px dashed var(--line);margin:6px 0;}
.solid{border-top:2px solid var(--ink);margin:8px 0;}

.item{background:var(--paper-alt);border-radius:8px;padding:10px;margin-bottom:8px;}
.item .ir{display:flex;gap:8px;margin-bottom:8px;}
.item .ir:last-child{margin-bottom:0;}
.item input,.item select{border:1px solid var(--line);border-radius:6px;padding:7px 8px;font-size:12.5px;background:#fff;min-width:0;}
.item input[type=date]{font-family:var(--mono);flex:1;}
.item input[type=text]{flex:1;}
.item input.val{font-family:var(--mono);width:100px;}
.del{background:#F6E4DF;color:var(--red);border:none;border-radius:6px;width:34px;height:34px;font-size:15px;cursor:pointer;flex-shrink:0;}
.addbtn{width:100%;background:var(--green);color:var(--paper);border:none;border-radius:8px;padding:11px;
  font-size:13px;font-weight:500;cursor:pointer;margin-top:6px;}

.alert{display:flex;gap:8px;background:#F6E4DF;border:1px solid rgba(166,65,46,.2);border-radius:10px;
  padding:10px 12px;font-size:12.5px;color:var(--red);}

.inv-cat{font-family:var(--disp);font-size:13.5px;font-weight:600;color:var(--green);margin-bottom:8px;}
.inv-loss{text-align:right;font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:6px;}
.inv-loss.bad{color:var(--red);}

.hist-item{width:100%;text-align:left;background:var(--paper-alt);border:1px solid var(--line);
  border-radius:8px;padding:11px 12px;margin-bottom:8px;cursor:pointer;}
.hist-item.cur{background:var(--green);border-color:var(--green);}
.hist-item .hr1{display:flex;justify-content:space-between;align-items:baseline;}
.hist-item .hm{font-family:var(--disp);font-size:14px;font-weight:600;color:var(--green);}
.hist-item .hv{font-family:var(--mono);font-size:13.5px;font-weight:600;}
.hist-item .hr2{display:flex;gap:12px;margin-top:3px;font-family:var(--mono);font-size:10.5px;color:var(--faint);}
.hist-item.cur .hm,.hist-item.cur .hv{color:var(--paper);}
.hist-item.cur .hr2{color:#B9C7BE;}

.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);
  font-family:var(--mono);font-size:11px;padding:7px 14px;border-radius:99px;opacity:0;transition:opacity .3s;
  display:flex;align-items:center;gap:6px;pointer-events:none;}
.toast.show{opacity:.9;}
.toast .dot{width:6px;height:6px;border-radius:99px;background:#7FCE9E;}
.toast.err{background:var(--red);}
.toast.err .dot{background:var(--paper);}

.empty{font-size:12.5px;color:var(--faint);}
.note{font-size:12px;color:var(--faint);line-height:1.5;margin-bottom:10px;}

/* setup screen */
.setup{max-width:480px;margin:40px auto;padding:0 16px;}
.setup h2{font-family:var(--disp);color:var(--green);font-size:20px;margin-bottom:6px;}
.setup p{font-size:13px;color:var(--faint);margin-bottom:14px;line-height:1.5;}
.setup textarea{width:100%;min-height:180px;border:1px solid var(--line);border-radius:8px;padding:12px;
  font-family:var(--mono);font-size:12px;background:#fff;outline:none;}
.setup .err-msg{color:var(--red);font-size:12.5px;margin-top:8px;display:none;}
.loading{display:flex;justify-content:center;padding:60px 0;color:var(--faint);font-size:13px;}
.hidden{display:none!important;}
</style>
</head>
<body>

<!-- APP -->
<div id="app" class="hidden">
  <div class="hdr"><div class="hdr-in">
    <div class="hdr-top">
      <div><h1>Painel do Mercado</h1><div class="tag">GESTÃO FINANCEIRA MENSAL</div></div>
      <div class="month-nav">
        <button id="prevM">‹</button><span id="monthLbl"></span><button id="nextM">›</button>
      </div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="l">LUCRO LÍQUIDO</div><div class="v" id="kLucro">—</div></div>
      <div class="kpi"><div class="l">MARGEM LÍQ.</div><div class="v" id="kMargem">—</div></div>
      <div class="kpi"><div class="l">PERDA</div><div class="v" id="kPerda">—</div></div>
    </div>
  </div></div>

  <div class="tabs" id="tabs">
    <button class="tab on" data-t="dre">DRE</button>
    <button class="tab" data-t="caixa">Caixa</button>
    <button class="tab" data-t="compras">Compras</button>
    <button class="tab" data-t="inv">Inventário</button>
    <button class="tab" data-t="hist">Histórico</button>
  </div>
  <div class="rule"></div>

  <div class="wrap" id="content"></div>
</div>

<div class="loading" id="loading">Carregando...</div>
<div class="toast" id="toast"><span class="dot"></span><span id="toastTxt">salvo</span></div>

<script>
// ============ config / firebase ============
// Config do projeto Firebase embutida no app — nunca precisa colar nada.
var FIREBASE_CONFIG={
  apiKey:"AIzaSyBZA2-CRFOeICuUg8pRRLfdHTSaatjY4Ec",
  authDomain:"painel-mercado-3496f.firebaseapp.com",
  projectId:"painel-mercado-3496f",
  storageBucket:"painel-mercado-3496f.firebasestorage.app",
  messagingSenderId:"580194769229",
  appId:"1:580194769229:web:b09937f25f95b5827fbf04"
};
var db=null;
function tryInit(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.firestore();
    return true;
  }catch(e){console.error(e);return false;}
}

// ============ estado ============
var DESPESAS=[
  ['pessoal','Pessoal (salários + encargos)'],['aluguel','Aluguel do ponto'],
  ['energia','Energia (loja + câmaras frias)'],['agua','Água / telefone / internet'],
  ['contabilidade','Contabilidade'],['embalagens','Embalagens / sacolas'],
  ['manutencao','Manutenção'],['prolabore','Pró-labore (gestão)']
];
var CATS=['Mercearia','Hortifruti','Açougue','Padaria','Limpeza / Outros'];

function defaultDespesas(){
  return DESPESAS.map(function(x){return {id:uid(),nome:x[1],valor:0};});
}
function defaultData(){
  var d={faturamento:0,deducoesPct:7,estoqueInicial:0,despesas:defaultDespesas(),despesasFinanceiras:0,
    receitasFinanceiras:0,compras:[],fluxoCaixa:[],inventario:[]};
  CATS.forEach(function(c){d.inventario.push({categoria:c,contabil:0,fisico:0});});
  return d;
}

var state={monthKey:nowKey(),data:defaultData(),tab:'dre',history:{},loading:true};
var saveTimer=null, firstLoad=true;

function nowKey(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function shiftKey(k,delta){var p=k.split('-');var d=new Date(+p[0],+p[1]-1+delta,1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function keyLabel(k){var p=k.split('-');var d=new Date(+p[0],+p[1]-1,1);
  var s=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  return s.charAt(0).toUpperCase()+s.slice(1);}
function brl(v){return (isFinite(v)?v:0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function pctf(v){return (isFinite(v)?v:0).toFixed(1)+'%';}
function uid(){return Date.now()+'-'+Math.random().toString(36).slice(2,7);}
function num(v){var n=parseFloat(v);return isFinite(n)?n:0;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function compute(d){
  var compras=d.compras.reduce(function(s,c){return s+num(c.valor);},0);
  var efc=d.inventario.reduce(function(s,i){return s+num(i.contabil);},0);
  var eff=d.inventario.reduce(function(s,i){return s+num(i.fisico);},0);
  var perda=efc-eff;
  var cmv=num(d.estoqueInicial)+compras-eff;
  var ded=d.faturamento*d.deducoesPct/100;
  var rl=d.faturamento-ded;
  var lb=rl-cmv;
  var desp=0;(d.despesas||[]).forEach(function(x){desp+=num(x.valor);});
  var ebit=lb-desp;
  var ll=ebit-num(d.despesasFinanceiras)+num(d.receitasFinanceiras);
  var ent=d.fluxoCaixa.filter(function(f){return f.tipo==='entrada';}).reduce(function(s,f){return s+num(f.valor);},0);
  var sai=d.fluxoCaixa.filter(function(f){return f.tipo==='saida';}).reduce(function(s,f){return s+num(f.valor);},0);
  return {compras:compras,efc:efc,eff:eff,perda:perda,cmv:cmv,ded:ded,rl:rl,lb:lb,desp:desp,ebit:ebit,ll:ll,
    mb:rl?lb/rl*100:0, ml:d.faturamento?ll/d.faturamento*100:0, perdaPct:d.faturamento?perda/d.faturamento*100:0,
    ent:ent,sai:sai,saldo:ent-sai};
}

// ============ firestore ============
function loadMonth(key){
  return db.collection('meses').doc(key).get().then(function(snap){
    if(snap.exists)return normalize(snap.data());
    var base=defaultData();
    return db.collection('meses').doc(shiftKey(key,-1)).get().then(function(prev){
      if(prev.exists){
        var pd=normalize(prev.data());
        base.estoqueInicial=pd.inventario.reduce(function(s,i){return s+num(i.fisico);},0);
      }
      return base;
    }).catch(function(){return base;});
  });
}
function normalize(d){
  var base=defaultData();
  for(var k in base){if(d[k]===undefined)d[k]=base[k];}
  if(!Array.isArray(d.inventario)||d.inventario.length===0)d.inventario=base.inventario;
  // migra despesas do formato antigo (objeto {pessoal:0,...}) para lista [{id,nome,valor}]
  if(d.despesas && !Array.isArray(d.despesas)){
    var labels={};DESPESAS.forEach(function(x){labels[x[0]]=x[1];});
    var lista=[];
    for(var key in d.despesas){
      lista.push({id:uid(),nome:labels[key]||key,valor:num(d.despesas[key])});
    }
    d.despesas=lista.length?lista:defaultDespesas();
  }
  if(!Array.isArray(d.despesas))d.despesas=defaultDespesas();
  return d;
}
function persist(){
  showToast('salvando...',false,true);
  return db.collection('meses').doc(state.monthKey).set(JSON.parse(JSON.stringify(state.data)))
  .then(function(){
    state.history[state.monthKey]=JSON.parse(JSON.stringify(state.data));
    showToast('salvo');
  })
  .catch(function(e){console.error(e);showToast('erro ao salvar',true);});
}
function loadAll(){
  return db.collection('meses').get().then(function(qs){
    var h={};qs.forEach(function(doc){h[doc.id]=normalize(doc.data());});
    return h;
  });
}
function scheduleSave(){
  if(firstLoad)return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(persist,700);
}

// ============ toast ============
var toastTimer=null;
function showToast(msg,isErr,sticky){
  var t=document.getElementById('toast');
  document.getElementById('toastTxt').textContent=msg;
  t.classList.toggle('err',!!isErr);
  t.classList.add('show');
  clearTimeout(toastTimer);
  if(!sticky)toastTimer=setTimeout(function(){t.classList.remove('show');},1600);
}

// ============ render ============
function render(){
  var s=compute(state.data);
  document.getElementById('monthLbl').textContent=keyLabel(state.monthKey);
  var kL=document.getElementById('kLucro');
  kL.textContent=brl(s.ll); kL.classList.toggle('neg',s.ll<0);
  document.getElementById('kMargem').textContent=pctf(s.ml);
  var kP=document.getElementById('kPerda');
  kP.textContent=pctf(s.perdaPct); kP.classList.toggle('neg',s.perdaPct>2);

  document.querySelectorAll('.tab').forEach(function(b){b.classList.toggle('on',b.dataset.t===state.tab);});

  var c=document.getElementById('content');
  if(state.tab==='dre')c.innerHTML=viewDRE(s);
  else if(state.tab==='caixa')c.innerHTML=viewCaixa(s);
  else if(state.tab==='compras')c.innerHTML=viewCompras(s);
  else if(state.tab==='inv')c.innerHTML=viewInv(s);
  else c.innerHTML=viewHist();
  bindInputs();
}

function fld(label,path,val,prefix){
  return '<div class="fld"><label>'+esc(label)+'</label><div class="box">'+
    (prefix?'<span class="pre">'+prefix+'</span>':'')+
    '<input type="number" inputmode="decimal" data-path="'+path+'" value="'+(val===0?'':val)+'" placeholder="0"></div></div>';
}
function row(l,v,opts){
  opts=opts||{};
  return '<div class="row'+(opts.b?' b':'')+(opts.ind?' ind':'')+'">'+
    '<span class="rl'+(opts.mut?' mut':'')+'">'+l+'</span>'+
    '<span class="rv'+(opts.neg?' neg':'')+(opts.mut?' mut':'')+'">'+v+'</span></div>';
}

function viewDRE(s){
  var d=state.data,h='';
  h+='<div class="card"><div class="ct">Receita</div><div class="cb"><div class="grid2">'+
    fld('Faturamento do mês','faturamento',d.faturamento,'R$')+
    fld('Deduções (Simples, %)','deducoesPct',d.deducoesPct,'%')+'</div></div></div>';
  h+='<div class="card"><div class="ct">Despesas operacionais</div><div class="cb">';
  h+='<p class="note">Toque no nome para renomear. Adicione ou remova categorias como quiser (ex: Gasolina/entregas). Cada mês pode ter categorias diferentes.</p>';
  if(!d.despesas.length)h+='<p class="empty">Nenhuma despesa. Toque abaixo para adicionar.</p>';
  d.despesas.forEach(function(x){
    h+='<div class="item"><div class="ir">'+
      '<input type="text" placeholder="Nome da despesa" value="'+esc(x.nome)+'" data-list="despesas" data-id="'+x.id+'" data-f="nome">'+
      '<input type="number" inputmode="decimal" class="val" placeholder="R$ 0" value="'+(x.valor===0?'':x.valor)+'" data-list="despesas" data-id="'+x.id+'" data-f="valor">'+
      '<button class="del" data-del="despesas" data-id="'+x.id+'">🗑</button>'+
      '</div></div>';
  });
  h+='<button class="addbtn" data-add="despesas">+ Nova despesa</button>';
  h+='<div class="dash"></div>'+row('Total de despesas',brl(s.desp),{b:1})+'</div></div>';
  h+='<div class="card"><div class="ct">Financeiro (fora da operação)</div><div class="cb"><div class="grid2">'+
    fld('Despesas financeiras (juros/tarifas)','despesasFinanceiras',d.despesasFinanceiras,'R$')+
    fld('Receitas financeiras','receitasFinanceiras',d.receitasFinanceiras,'R$')+'</div></div></div>';
  h+='<div class="card"><div class="ct">Resultado do mês</div><div class="cb">'+
    row('Receita bruta',brl(d.faturamento))+
    row('Deduções ('+d.deducoesPct+'%)','- '+brl(s.ded),{neg:1,ind:1})+
    row('Receita líquida',brl(s.rl),{b:1})+'<div class="dash"></div>'+
    row('CMV (base física real)','- '+brl(s.cmv),{neg:1})+
    row('Lucro bruto',brl(s.lb),{b:1})+
    row('Margem bruta',pctf(s.mb),{mut:1,ind:1})+'<div class="dash"></div>'+
    row('Despesas operacionais','- '+brl(s.desp),{neg:1})+
    row('Lucro operacional (EBIT)',brl(s.ebit),{b:1})+'<div class="dash"></div>'+
    row('Despesas financeiras','- '+brl(num(d.despesasFinanceiras)),{neg:1,ind:1})+
    row('Receitas financeiras','+ '+brl(num(d.receitasFinanceiras)),{ind:1})+'<div class="solid"></div>'+
    row('Lucro líquido',brl(s.ll),{b:1})+
    row('Margem líquida',pctf(s.ml),{mut:1,ind:1})+
    '</div></div>';
  if(s.perdaPct>2)h+='<div class="alert">⚠️ Perda de '+pctf(s.perdaPct)+' do faturamento está acima da faixa normal (1–2%). Vale investigar categoria por categoria na aba Inventário.</div>';
  return h;
}

function viewCaixa(s){
  var d=state.data,h='';
  h+='<div class="card"><div class="ct">Saldo de caixa do mês</div><div class="cb">'+
    row('Entradas',brl(s.ent))+row('Saídas','- '+brl(s.sai),{neg:1})+'<div class="solid"></div>'+
    row('Saldo',brl(s.saldo),{b:1,neg:s.saldo<0})+'</div></div>';
  h+='<div class="card"><div class="ct">Lançamentos</div><div class="cb">';
  if(!d.fluxoCaixa.length)h+='<p class="empty">Nenhum lançamento ainda. Adicione entradas e saídas do dia a dia.</p>';
  d.fluxoCaixa.forEach(function(f){
    h+='<div class="item">'+
      '<div class="ir"><input type="date" value="'+esc(f.data)+'" data-list="fluxoCaixa" data-id="'+f.id+'" data-f="data">'+
      '<select data-list="fluxoCaixa" data-id="'+f.id+'" data-f="tipo">'+
      '<option value="entrada"'+(f.tipo==='entrada'?' selected':'')+'>Entrada</option>'+
      '<option value="saida"'+(f.tipo==='saida'?' selected':'')+'>Saída</option></select>'+
      '<button class="del" data-del="fluxoCaixa" data-id="'+f.id+'">🗑</button></div>'+
      '<div class="ir"><input type="text" placeholder="Descrição" value="'+esc(f.descricao)+'" data-list="fluxoCaixa" data-id="'+f.id+'" data-f="descricao">'+
      '<input type="number" inputmode="decimal" class="val" placeholder="R$ 0" value="'+(f.valor===0?'':f.valor)+'" data-list="fluxoCaixa" data-id="'+f.id+'" data-f="valor"></div>'+
      '</div>';
  });
  h+='<button class="addbtn" data-add="fluxoCaixa">+ Novo lançamento</button></div></div>';
  return h;
}

function viewCompras(s){
  var d=state.data,h='';
  h+='<div class="card"><div class="ct">Estoque inicial do mês</div><div class="cb">'+
    fld('Estoque inicial (herdado do físico do mês anterior — ajuste se necessário)','estoqueInicial',d.estoqueInicial,'R$')+
    '</div></div>';
  h+='<div class="card"><div class="ct">Compras do mês</div><div class="cb">';
  if(!d.compras.length)h+='<p class="empty">Nenhuma compra registrada ainda.</p>';
  d.compras.forEach(function(cp){
    h+='<div class="item">'+
      '<div class="ir"><input type="date" value="'+esc(cp.data)+'" data-list="compras" data-id="'+cp.id+'" data-f="data">'+
      '<button class="del" data-del="compras" data-id="'+cp.id+'">🗑</button></div>'+
      '<div class="ir"><input type="text" placeholder="Fornecedor" value="'+esc(cp.fornecedor)+'" data-list="compras" data-id="'+cp.id+'" data-f="fornecedor">'+
      '<input type="number" inputmode="decimal" class="val" placeholder="R$ 0" value="'+(cp.valor===0?'':cp.valor)+'" data-list="compras" data-id="'+cp.id+'" data-f="valor"></div>'+
      '</div>';
  });
  h+='<button class="addbtn" data-add="compras">+ Nova compra</button>'+
    '<div class="dash"></div>'+row('Total de compras no mês',brl(s.compras),{b:1})+'</div></div>';
  return h;
}

function viewInv(s){
  var d=state.data,h='';
  h+='<div class="card"><div class="ct">Contábil × Físico por categoria</div><div class="cb">'+
    '<p class="note">Contábil é o que o sistema calcula. Físico é o que foi contado na prateleira. A diferença é a perda.</p>';
  d.inventario.forEach(function(rw,i){
    var perda=num(rw.contabil)-num(rw.fisico);
    h+='<div class="item"><div class="inv-cat">'+esc(rw.categoria)+'</div><div class="grid2">'+
      fld('Contábil','inventario.'+i+'.contabil',rw.contabil,'R$')+
      fld('Físico (contado)','inventario.'+i+'.fisico',rw.fisico,'R$')+
      '</div><div class="inv-loss'+(perda>0?' bad':'')+'">perda: '+brl(perda)+'</div></div>';
  });
  h+='</div></div>';
  h+='<div class="card"><div class="ct">Totais</div><div class="cb">'+
    row('Estoque final contábil',brl(s.efc))+
    row('Estoque final físico',brl(s.eff))+'<div class="dash"></div>'+
    row('Perda total',brl(s.perda),{b:1,neg:s.perda>0})+
    row('Perda / faturamento',pctf(s.perdaPct),{mut:1,ind:1})+'</div></div>';
  return h;
}

function viewHist(){
  var keys=Object.keys(state.history).sort().reverse();
  var h='<div class="card"><div class="ct">Meses salvos</div><div class="cb">';
  if(!keys.length)h+='<p class="empty">Nenhum mês salvo ainda. Preencha os dados nas outras abas — o salvamento é automático.</p>';
  keys.forEach(function(k){
    var sm=compute(normalize(state.history[k]));
    var cur=k===state.monthKey;
    h+='<button class="hist-item'+(cur?' cur':'')+'" data-month="'+k+'">'+
      '<div class="hr1"><span class="hm">'+keyLabel(k)+'</span><span class="hv"'+(!cur&&sm.ll<0?' style="color:var(--red)"':'')+'>'+brl(sm.ll)+'</span></div>'+
      '<div class="hr2"><span>faturamento '+brl(state.history[k].faturamento)+'</span>'+
      '<span>margem '+pctf(sm.ml)+'</span>'+
      '<span'+(sm.perdaPct>2?' style="color:var(--red)"':'')+'>perda '+pctf(sm.perdaPct)+'</span></div></button>';
  });
  h+='</div></div>';
  return h;
}

// ============ eventos ============
function setPath(path,value){
  var parts=path.split('.'), obj=state.data;
  for(var i=0;i<parts.length-1;i++)obj=obj[parts[i]];
  obj[parts[parts.length-1]]=value;
}

function bindInputs(){
  document.querySelectorAll('[data-path]').forEach(function(inp){
    inp.addEventListener('input',function(){
      setPath(inp.dataset.path,inp.value===''?0:num(inp.value));
      updateComputedOnly();
      scheduleSave();
    });
  });
  document.querySelectorAll('[data-list]').forEach(function(inp){
    inp.addEventListener('input',function(){
      var arr=state.data[inp.dataset.list];
      var it=arr.find(function(x){return x.id===inp.dataset.id;});
      if(!it)return;
      var v=inp.value;
      if(inp.dataset.f==='valor')v=(v===''?0:num(v));
      it[inp.dataset.f]=v;
      updateComputedOnly();
      scheduleSave();
    });
  });
  document.querySelectorAll('[data-del]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var arr=state.data[btn.dataset.del];
      state.data[btn.dataset.del]=arr.filter(function(x){return x.id!==btn.dataset.id;});
      scheduleSave();render();
    });
  });
  document.querySelectorAll('[data-add]').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(btn.dataset.add==='compras')state.data.compras.push({id:uid(),data:'',fornecedor:'',valor:0});
      else if(btn.dataset.add==='despesas')state.data.despesas.push({id:uid(),nome:'',valor:0});
      else state.data.fluxoCaixa.push({id:uid(),data:'',tipo:'entrada',descricao:'',valor:0});
      scheduleSave();render();
    });
  });
  document.querySelectorAll('[data-month]').forEach(function(btn){
    btn.addEventListener('click',function(){switchMonth(btn.dataset.month);});
  });
}

// atualiza só KPIs e blocos de resultado sem re-renderizar inputs (para não perder foco)
function updateComputedOnly(){
  var s=compute(state.data);
  var kL=document.getElementById('kLucro');
  kL.textContent=brl(s.ll);kL.classList.toggle('neg',s.ll<0);
  document.getElementById('kMargem').textContent=pctf(s.ml);
  var kP=document.getElementById('kPerda');
  kP.textContent=pctf(s.perdaPct);kP.classList.toggle('neg',s.perdaPct>2);
}

function switchMonth(newKey){
  clearTimeout(saveTimer);
  persist().then(function(){
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
    return loadMonth(newKey);
  }).then(function(d){
    state.data=d;state.monthKey=newKey;
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    render();
  });
}

document.getElementById('prevM').addEventListener('click',function(){switchMonth(shiftKey(state.monthKey,-1));});
document.getElementById('nextM').addEventListener('click',function(){switchMonth(shiftKey(state.monthKey,1));});
document.getElementById('tabs').addEventListener('click',function(e){
  var b=e.target.closest('.tab');if(!b)return;
  state.tab=b.dataset.t;render();
});

// ============ boot ============
if(tryInit()){
  Promise.all([loadMonth(state.monthKey),loadAll()]).then(function(res){
    state.data=res[0];state.history=res[1];
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    firstLoad=false;
    render();
  }).catch(function(e){
    console.error(e);
    document.getElementById('loading').textContent='Erro ao conectar no Firebase. Confira as regras do Firestore. ('+e.message+')';
  });
}else{
  document.getElementById('loading').textContent='Erro ao iniciar o Firebase.';
}

// registra o service worker (permite instalar como app e abrir offline)
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(e){console.log('SW não registrado:',e);});
  });
}
</script>

</html>
